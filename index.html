<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SceneFake Perceptual Study</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>
  Real or Fake?<br>
  <span class="subheading">SceneFake Edition</span>
</h1>

  <p class="subtitle">
    Focus on background sounds. Ignore speech.
    Did this actually happen or was it cooked up in Python?
  </p>

  <form name="scenefake-quiz"
      method="POST"
      data-netlify="true"
      action="/success">


    <input type="hidden" name="form-name" value="scenefake-quiz">
    <input type="hidden" id="participant_id" name="participant_id">
    <input type="hidden" id="scoreField" name="score">

    <div id="audio-container" class="grid"></div>

    <div class="submit-wrapper">
      <button type="submit">Submit Responses</button>
    </div>

  </form>

  <!-- Netlify form detection helper -->
<form name="scenefake-quiz" data-netlify="true" hidden>
  <input type="text" name="participant_id">
  <input type="text" name="score">
  <input type="text" name="audio1">
  <input type="text" name="audio2">
  <input type="text" name="audio3">
  <input type="text" name="audio4">
  <input type="text" name="audio5">
  <input type="text" name="audio6">
  <input type="text" name="audio7">
  <input type="text" name="audio8">
  <input type="text" name="audio9">
  <input type="text" name="audio10">
  <input type="text" name="audio11">
  <input type="text" name="audio12">
  <input type="text" name="audio13">
  <input type="text" name="audio14">
  <input type="text" name="audio15">
  <input type="text" name="audio16">
  <input type="text" name="audio17">
  <input type="text" name="audio18">
  <input type="text" name="audio19">
  <input type="text" name="audio20">
</form>

</div>

<script src="script.js"></script>
</body>
</html>
